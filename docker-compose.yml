version: '3.8'

services:
  vulnerable-app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
